<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/_fragments :: head('Dashboard')}"></head>
<body>
<div class="d-flex">

    <div th:replace="~{admin/_fragments :: sidebar(${currentPage})}"></div>

    <div id="main" class="flex-fill">
        <div class="top-bar d-flex justify-content-between align-items-center">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0 small">
                    <li class="breadcrumb-item active">Dashboard</li>
                </ol>
            </nav>
            <div th:replace="~{admin/_fragments :: logoutBtn}"></div>
        </div>

        <div class="p-4">
            <h5 class="fw-bold mb-4">Dashboard</h5>
            <div class="alert alert-info d-flex align-items-center gap-2">
                <i class="bi bi-info-circle-fill fs-5"></i>
                <span>Tính năng dashboard (T24) sẽ được implement sau. Hiện tại bạn có thể quản lý users tại menu bên trái.</span>
            </div>
            <div class="row g-3 mt-1">
                <div class="col-md-4">
                    <a th:href="@{/admin/users}" class="card text-decoration-none text-dark border-0 shadow-sm h-100">
                        <div class="card-body d-flex align-items-center gap-3 p-4">
                            <div class="rounded-3 p-3 bg-primary bg-opacity-10">
                                <i class="bi bi-people fs-4 text-primary"></i>
                            </div>
                            <div>
                                <div class="fw-semibold">Quản lý Users</div>
                                <div class="text-muted small">Xem, kích hoạt, khóa tài khoản</div>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>

</div>
<div th:replace="~{admin/_fragments :: scripts}"></div>
</body>
</html>
