<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/_fragments :: head(${isEdit} ? 'Sửa Category' : 'Thêm Category')}"></head>
<body>
<div class="d-flex">

    <div th:replace="~{admin/_fragments :: sidebar(${currentPage})}"></div>

    <div id="main" class="flex-fill">
        <div class="top-bar d-flex justify-content-between align-items-center">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0 small">
                    <li class="breadcrumb-item"><a th:href="@{/admin/categories}" class="text-decoration-none">Categories</a></li>
                    <li class="breadcrumb-item active" th:text="${isEdit} ? 'Sửa' : 'Thêm mới'"></li>
                </ol>
            </nav>
            <div th:replace="~{admin/_fragments :: logoutBtn}"></div>
        </div>

        <div class="p-4" style="max-width:680px">
            <div class="d-flex align-items-center gap-3 mb-4">
                <a th:href="@{/admin/categories}" class="btn btn-sm btn-outline-secondary" aria-label="Quay lại danh sách category">
                    <i class="bi bi-arrow-left" aria-hidden="true"></i>
                </a>
                <h5 class="fw-bold mb-0" th:text="${isEdit} ? 'Sửa Category' : 'Thêm Category mới'"></h5>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show py-2">
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="${isEdit} ? @{/admin/categories/{id}/edit(id=${category.id})} : @{/admin/categories}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label fw-medium">Tên <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control"
                                   th:value="${category.name}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Slug</label>
                            <input type="text" name="slug" class="form-control"
                                   th:value="${category.slug}" placeholder="Tự sinh từ tên nếu để trống">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Category cha</label>
                            <select name="parentId" class="form-select">
                                <option value="">— Không có (root) —</option>
                                <option th:each="opt : ${parentOptions}"
                                        th:value="${opt.id}"
                                        th:text="${opt.label}"
                                        th:selected="${opt.id == category.parentId}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Mô tả</label>
                            <textarea name="description" class="form-control" rows="3"
                                      th:text="${category.description}"></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-medium">URL ảnh</label>
                            <input type="text" name="imageUrl" class="form-control"
                                   th:value="${category.imageUrl}" placeholder="https://...">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-check-lg me-1"></i>
                                <span th:text="${isEdit} ? 'Cập nhật' : 'Tạo mới'"></span>
                            </button>
                            <a th:href="@{/admin/categories}" class="btn btn-outline-secondary">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
<div th:replace="~{admin/_fragments :: scripts}"></div>
</body>
</html>
